<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dzen RAG — Канал про ИИ</title>
  <link rel="stylesheet" href="/ui/style.css" />
</head>
<body>
  <div class="layout">
    <header class="header">
      <div>
        <h1>Dzen RAG</h1>
        <p class="subtitle">Ассистент по материалам канала «Канал про ИИ»</p>
      </div>
      <div id="health-badge" class="badge badge--loading">загрузка…</div>
    </header>

    <section class="controls card">
      <label>
        LLM
        <select id="provider">
          <option value="auto">auto (DeepSeek если есть ключ)</option>
          <option value="deepseek">deepseek</option>
          <option value="lm_studio">lm_studio</option>
          <option value="none">none — только фрагменты</option>
        </select>
      </label>
      <label>
        Фрагментов
        <input id="top-k" type="number" min="1" max="20" value="5" />
      </label>
      <button type="button" id="refresh-health" class="btn btn--ghost">Обновить статус</button>
    </section>

    <main class="chat card">
      <div id="messages" class="messages">
        <div class="msg msg--system">
          Задайте вопрос по модулю 1.3 и другим материалам на G:. Ответ строится по проиндексированным PDF и md.
        </div>
      </div>

      <form id="chat-form" class="composer">
        <textarea
          id="query"
          rows="3"
          placeholder="Например: Что делегировать ИИ инженеру?"
          required
        ></textarea>
        <button type="submit" class="btn btn--primary" id="send-btn">Спросить</button>
      </form>
    </main>

    <footer class="footer">
      API: <code id="api-base"></code> ·
      <a href="/docs" target="_blank" rel="noreferrer">Swagger</a> ·
      <a href="/health" target="_blank" rel="noreferrer">health</a>
    </footer>
  </div>
  <script src="/ui/app.js"></script>
</body>
</html>
